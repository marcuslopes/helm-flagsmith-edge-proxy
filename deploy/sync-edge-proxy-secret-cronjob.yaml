# Sync CronJob: periodically fetches environment key pairs from Flagsmith Admin
# API and creates/updates the edge-proxy-config Secret. Runs every 5 minutes so
# that key rotations in Flagsmith are automatically picked up. Requires the
# flagsmith-organisation-token Secret (see deploy/flagsmith-organisation-token.example.yaml).
#
# The sync script (deploy/scripts/Sync-EdgeProxySecret.ps1) must be loaded
# into a ConfigMap before applying this manifest:
#   kubectl create configmap sync-edge-proxy-secret-script \
#     --from-file=Sync-EdgeProxySecret.ps1=deploy/scripts/Sync-EdgeProxySecret.ps1 \
#     -n flagsmith --dry-run=client -o yaml | kubectl apply -f - -n flagsmith
#
# Then apply:
#   kubectl apply -f deploy/sync-edge-proxy-secret-cronjob.yaml -n flagsmith
#
# Create the Organisation Token Secret first:
#   cp deploy/flagsmith-organisation-token.example.yaml deploy/flagsmith-organisation-token.yaml
#   # Edit and add your token from Flagsmith UI (Organisation -> API Keys)
#   kubectl apply -f deploy/flagsmith-organisation-token.yaml -n flagsmith
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sync-edge-proxy-secret
subjects:
  - kind: ServiceAccount
    name: sync-edge-proxy-secret
    namespace: flagsmith
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: sync-edge-proxy-secret
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: mcr.microsoft.com/powershell:lts-alpine-3.20
              command:
                - pwsh
                - -NoProfile
                - -File
                - /scripts/Sync-EdgeProxySecret.ps1
              env:
                - name: ENVIRONMENT_NAME
                  value: "Dev"
                - name: FLAGSMITH_API_URL
                  value: "http://flagsmith-api.flagsmith.svc.cluster.local:8000"
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: ORGANISATION_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: flagsmith-organisation-token
                      key: ORGANISATION_API_TOKEN
                      optional: true
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
          volumes:
            - name: script
              configMap:
                name: sync-edge-proxy-secret-script
                defaultMode: 0o555
