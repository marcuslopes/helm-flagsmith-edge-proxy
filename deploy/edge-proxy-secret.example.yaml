# Example Secret for Edge Proxy. Do NOT commit real keys.
#
# 1. Copy this file: cp edge-proxy-secret.example.yaml edge-proxy-secret.yaml
# 2. Replace placeholders with values from Flagsmith UI:
#    - In Flagsmith: Project -> Environment -> copy "Server-side key" and "Client-side key"
#    - API_URL: use the in-cluster URL below (or override if Flagsmith is in another namespace)
# 3. Apply: kubectl apply -f edge-proxy-secret.yaml
#
# The Secret must exist before installing the edge-proxy Helm chart (existingSecret: edge-proxy-config).
---
apiVersion: v1
kind: Secret
metadata:
  name: edge-proxy-config
  namespace: flagsmith
type: Opaque
stringData:
  API_URL: "http://flagsmith-api.flagsmith.svc.cluster.local:8000/api/v1"
  ENVIRONMENT_KEY_PAIRS: '[{"server_side_key":"ser.YOUR_SERVER_SIDE_KEY","client_side_key":"YOUR_CLIENT_SIDE_KEY"}]'
