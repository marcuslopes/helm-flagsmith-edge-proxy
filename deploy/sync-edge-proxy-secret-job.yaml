# Sync Job: fetches 1-2 environment key pairs from Flagsmith Admin API and
# creates/updates the edge-proxy-config Secret. Requires the
# flagsmith-organisation-token Secret (see deploy/flagsmith-organisation-token.example.yaml).
#
# Apply after Flagsmith is running:
#   kubectl apply -f deploy/sync-edge-proxy-secret-job.yaml -n flagsmith
# Create the Organisation Token Secret first:
#   cp deploy/flagsmith-organisation-token.example.yaml deploy/flagsmith-organisation-token.yaml
#   # Edit and add your token from Flagsmith UI (Organisation -> API Keys)
#   kubectl apply -f deploy/flagsmith-organisation-token.yaml -n flagsmith
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-edge-proxy-secret-script
  namespace: flagsmith
data:
  sync-edge-proxy-secret.py: |
    #!/usr/bin/env python3
    """Fetch 1-2 environment key pairs from Flagsmith Admin API and create/update edge-proxy-config Secret."""
    import os, sys, time, json, urllib.request, urllib.error, ssl

    def wait_for_api(base_url, token, max_attempts=30):
        url = base_url.rstrip("/") + "/api/v1/projects/"
        req = urllib.request.Request(url, headers={"Authorization": "Api-Key " + token})
        for _ in range(max_attempts):
            try:
                with urllib.request.urlopen(req, timeout=5, context=ssl.create_default_context()) as r:
                    if r.status in (200, 401): return True
            except urllib.error.HTTPError as e:
                if e.code == 401: return True
            except OSError: pass
            time.sleep(2)
        return False

    def api_get(base_url, path, token):
        url = base_url.rstrip("/") + path
        req = urllib.request.Request(url, headers={"Authorization": "Api-Key " + token})
        with urllib.request.urlopen(req, timeout=15, context=ssl.create_default_context()) as r:
            return json.loads(r.read().decode())

    def api_post(base_url, path, token, data):
        url = base_url.rstrip("/") + path
        body = json.dumps(data).encode()
        req = urllib.request.Request(url, data=body, method="POST",
            headers={"Authorization": "Api-Key " + token, "Content-Type": "application/json"})
        with urllib.request.urlopen(req, timeout=15, context=ssl.create_default_context()) as r:
            return json.loads(r.read().decode())

    def main():
        token = os.environ.get("ORGANISATION_API_TOKEN", "").strip()
        base_url = (os.environ.get("FLAGSMITH_API_URL") or "").strip()
        namespace = os.environ.get("NAMESPACE", "flagsmith")
        max_pairs = int(os.environ.get("MAX_ENV_PAIRS", "2"))
        if not token:
            print("ORGANISATION_API_TOKEN not set; skipping sync.", file=sys.stderr)
            return 0
        if not base_url:
            print("FLAGSMITH_API_URL not set.", file=sys.stderr)
            return 1
        api_url_for_edge = base_url.rstrip("/") + "/api/v1"
        print("Waiting for Flagsmith API...")
        if not wait_for_api(base_url, token):
            print("Flagsmith API not reachable.", file=sys.stderr)
            return 1
        print("Flagsmith API is up.")
        try:
            projects = api_get(base_url, "/api/v1/projects/", token)
        except urllib.error.HTTPError as e:
            print("Failed to list projects:", e.code, file=sys.stderr)
            return 1
        project_list = projects.get("results") if isinstance(projects.get("results"), list) else (projects if isinstance(projects, list) else [])
        if not project_list:
            print("No projects found.", file=sys.stderr)
            return 1
        project_id = project_list[0]["id"]
        try:
            envs_resp = api_get(base_url, "/api/v1/environments/?project=" + str(project_id), token)
        except urllib.error.HTTPError as e:
            print("Failed to list environments:", e.code, file=sys.stderr)
            return 1
        envs = envs_resp.get("results") if isinstance(envs_resp.get("results"), list) else (envs_resp if isinstance(envs_resp, list) else [])
        if not envs:
            try:
                api_post(base_url, "/api/v1/environments/", token, {"name": "Development", "project": project_id})
                envs_resp = api_get(base_url, "/api/v1/environments/?project=" + str(project_id), token)
                envs = envs_resp.get("results") if isinstance(envs_resp.get("results"), list) else (envs_resp if isinstance(envs_resp, list) else [])
            except Exception as e:
                print("Could not create default environment:", e, file=sys.stderr)
                return 1
        if not envs:
            print("No environments found.", file=sys.stderr)
            return 1
        pairs = []
        for env in envs[:max_pairs]:
            client_key = env.get("api_key")
            if not client_key: continue
            server_key = None
            try:
                keys_resp = api_get(base_url, "/api/v1/environments/" + str(client_key) + "/api-keys/", token)
                key_list = keys_resp.get("results") if isinstance(keys_resp.get("results"), list) else (keys_resp if isinstance(keys_resp, list) else ([keys_resp] if keys_resp.get("key") else []))
                for k in key_list or []:
                    if k.get("active", True) and k.get("key"):
                        server_key = k["key"]; break
            except Exception: pass
            if server_key:
                pairs.append({"server_side_key": server_key, "client_side_key": client_key})
        if not pairs:
            print("No environment key pairs collected.", file=sys.stderr)
            return 1
        secret_data = {"API_URL": api_url_for_edge, "ENVIRONMENT_KEY_PAIRS": json.dumps(pairs)}
        try:
            from kubernetes import client, config
            config.load_incluster_config()
            v1 = client.CoreV1Api()
            from kubernetes.client.rest import ApiException
            body = client.V1Secret(metadata=client.V1ObjectMeta(name="edge-proxy-config", namespace=namespace), type="Opaque", string_data=secret_data)
            try:
                v1.replace_namespaced_secret("edge-proxy-config", namespace, body)
                print("Updated Secret edge-proxy-config.")
            except ApiException as e:
                if e.status == 404:
                    v1.create_namespaced_secret(namespace, body)
                    print("Created Secret edge-proxy-config.")
                else: raise
        except Exception as e:
            print("Failed to create/update Secret:", e, file=sys.stderr)
            return 1
        return 0
    sys.exit(main())
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sync-edge-proxy-secret
subjects:
  - kind: ServiceAccount
    name: sync-edge-proxy-secret
    namespace: flagsmith
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-edge-proxy-secret
  namespace: flagsmith
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: sync-edge-proxy-secret
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: python:3.11-alpine
          command:
            - /bin/sh
            - -c
            - "pip install --break-system-packages kubernetes && python /scripts/sync-edge-proxy-secret.py"
          env:
            - name: FLAGSMITH_API_URL
              value: "http://flagsmith-api.flagsmith.svc.cluster.local:8000"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ORGANISATION_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: flagsmith-organisation-token
                  key: ORGANISATION_API_TOKEN
                  optional: true
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: script
          configMap:
            name: sync-edge-proxy-secret-script
            defaultMode: 0o555
